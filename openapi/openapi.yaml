openapi: 3.0.3
info:
  title: Greenquote API
  version: 0.1.0
  description: Residential solar pre-qualification — NestJS backend (`/api` prefix).

servers:
  - url: http://localhost:3001/api
    description: Local development

paths:
  /health:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Liveness probe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register and receive a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login and receive a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /quotes:
    get:
      operationId: listMyQuotes
      tags: [quotes]
      summary: List quotes for the authenticated user (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 30
            default: 30
          description: Page size (max 30)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyQuotesList"
    post:
      operationId: createQuote
      tags: [quotes]
      summary: Create a pre-qualification quote
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDetail"

  /quotes/{id}:
    get:
      operationId: getQuoteById
      tags: [quotes]
      summary: Get a single quote (owner or admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDetail"

  /quotes/{id}/amortization:
    get:
      operationId: getQuoteAmortization
      tags: [quotes]
      summary: Amortization schedule for one installment term (owner or admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: termYears
          in: query
          required: true
          description: Installment term in years (must match a stored offer)
          schema:
            type: integer
            enum: [5, 10, 15]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteAmortizationResponse"
        "400":
          description: Invalid term or no offer for this term
        "403":
          description: Forbidden
        "404":
          description: Quote not found

  /admin/quotes:
    get:
      operationId: listAllQuotesAdmin
      tags: [admin]
      summary: List quotes (admin only), paginated
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Filter by user email or name (substring)
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 30
            default: 30
          description: Page size (max 30)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminQuotesList"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RegisterRequest:
      type: object
      required: [fullName, email, password]
      properties:
        fullName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    AuthResponse:
      type: object
      required: [access_token, user]
      properties:
        access_token:
          type: string
        user:
          type: object
          required: [id, email, fullName, role]
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
            fullName:
              type: string
            role:
              type: string

    CreateQuoteRequest:
      type: object
      required:
        - fullName
        - email
        - monthlyConsumptionKwh
        - systemSizeKw
        - downPayment
      properties:
        fullName:
          type: string
          minLength: 2
          maxLength: 255
        email:
          type: string
          format: email
        monthlyConsumptionKwh:
          type: number
        systemSizeKw:
          type: number
        downPayment:
          type: number
          description: EUR
        installationAddress:
          type: string
          maxLength: 500

    AmortizationRow:
      type: object
      required:
        - month
        - payment
        - principal
        - interest
        - balanceRemaining
      properties:
        month:
          type: integer
          minimum: 1
        payment:
          type: number
        principal:
          type: number
        interest:
          type: number
        balanceRemaining:
          type: number

    QuoteAmortizationResponse:
      type: object
      required:
        - termYears
        - apr
        - principalEur
        - monthlyPayment
        - rows
        - totalInterestEur
      properties:
        termYears:
          type: integer
          enum: [5, 10, 15]
        apr:
          type: number
        principalEur:
          type: number
        monthlyPayment:
          type: number
        rows:
          type: array
          items:
            $ref: "#/components/schemas/AmortizationRow"
        totalInterestEur:
          type: number

    QuoteOffer:
      type: object
      required:
        - termYears
        - apr
        - principalUsed
        - monthlyPayment
      properties:
        termYears:
          type: integer
        apr:
          type: number
        principalUsed:
          type: number
        monthlyPayment:
          type: number

    QuoteInputs:
      type: object
      required:
        - monthlyConsumptionKwh
        - systemSizeKw
        - downPaymentEur
      properties:
        fullName:
          type: string
          description: Snapshot from the quote form at creation time
        email:
          type: string
          description: Snapshot email at creation time
        monthlyConsumptionKwh:
          type: number
        systemSizeKw:
          type: number
        downPaymentEur:
          type: number
        installationAddress:
          type: string

    QuoteDerived:
      type: object
      required:
        - currency
        - systemPriceEur
        - principalEur
        - riskBand
        - aprPercent
      properties:
        currency:
          type: string
          enum: [EUR]
        systemPriceEur:
          type: number
        principalEur:
          type: number
        riskBand:
          type: string
          enum: [A, B, C]
        aprPercent:
          type: number

    Contact:
      type: object
      required: [fullName, email]
      properties:
        fullName:
          type: string
        email:
          type: string

    QuoteDetail:
      type: object
      required:
        - id
        - createdAt
        - inputs
        - derived
        - offers
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        contact:
          $ref: "#/components/schemas/Contact"
        inputs:
          $ref: "#/components/schemas/QuoteInputs"
        derived:
          $ref: "#/components/schemas/QuoteDerived"
        offers:
          type: array
          items:
            $ref: "#/components/schemas/QuoteOffer"

    QuoteSummary:
      type: object
      required:
        - id
        - createdAt
        - systemSizeKw
        - systemPrice
        - riskBand
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        systemSizeKw:
          type: number
        systemPrice:
          type: number
        riskBand:
          type: string
          enum: [A, B, C]
        userName:
          type: string
          description: Contact display name (list views)
        userEmail:
          type: string
        city:
          type: string
          description: Installation city derived from address when available

    AdminQuoteRow:
      allOf:
        - $ref: "#/components/schemas/QuoteSummary"
        - type: object
          required: [userEmail, userName]
          properties:
            userEmail:
              type: string
            userName:
              type: string

    MyQuotesList:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/QuoteSummary"
        total:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
          maximum: 30

    AdminQuotesList:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminQuoteRow"
        total:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
          maximum: 30
