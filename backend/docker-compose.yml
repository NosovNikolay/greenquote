services:
  postgres:
    image: postgres:16-alpine
    container_name: greenquote-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: greenquote
      POSTGRES_PASSWORD: greenquote
      POSTGRES_DB: greenquote
    # Host 5433 avoids clashing with a local Postgres often bound to 5432.
    ports:
      - '5433:5432'
    volumes:
      - greenquote_pg_data:/var/lib/postgresql/data

volumes:
  greenquote_pg_data:
